<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Sudoku Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:sans-serif;background:#020617;color:white;text-align:center}
h1{margin:10px}
#board{display:grid;grid-template-columns:repeat(9,1fr);max-width:360px;margin:auto}
.cell{border:1px solid #334155;height:40px;display:flex;align-items:center;justify-content:center;position:relative}
input{width:100%;height:100%;text-align:center;background:#020617;color:white;border:none;font-size:18px}
.notes{position:absolute;font-size:8px;top:2px;left:2px;color:#94a3b8}
.controls{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
button{padding:8px 12px;border:none;border-radius:6px;background:#38bdf8;cursor:pointer}
select{padding:6px}
</style>
</head>
<body>

<h1>🔥 Super Sudoku Pro</h1>
<div>⏱ Time: <span id="timer">0</span>s</div>

<select id="difficulty">
<option value="35">Easy</option>
<option value="45" selected>Medium</option>
<option value="55">Hard</option>
</select>

<div id="board"></div>

<div class="controls">
<button onclick="newGame()">New Game</button>
<button onclick="checkSolution()">Check</button>
<button onclick="solveGame()">Solve</button>
<button onclick="toggleNotes()">Notes Mode</button>
</div>

<script>
const board=document.getElementById('board');
let grid=[],notesMode=false,timer=0,interval;

function startTimer(){clearInterval(interval);timer=0;interval=setInterval(()=>{timer++;document.getElementById('timer').innerText=timer},1000)}

function createBoard(){board.innerHTML='';for(let i=0;i<81;i++){let cell=document.createElement('div');cell.className='cell';let input=document.createElement('input');let note=document.createElement('div');note.className='notes';cell.appendChild(input);cell.appendChild(note);
input.oninput=()=>{
let val=input.value.replace(/[^1-9]/g,'');
if(notesMode && val){note.innerText+=val;input.value=''}
else input.value=val;
};
board.appendChild(cell)}}

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function isSafe(g,r,c,n){for(let i=0;i<9;i++)if(g[r*9+i]==n||g[i*9+c]==n)return false;
let sr=r-r%3,sc=c-c%3;
for(let i=0;i<3;i++)for(let j=0;j<3;j++)if(g[(sr+i)*9+(sc+j)]==n)return false;
return true}

function solve(g){for(let i=0;i<81;i++)if(g[i]==0){let r=Math.floor(i/9),c=i%9;
for(let n=1;n<=9;n++)if(isSafe(g,r,c,n)){g[i]=n;if(solve(g))return true;g[i]=0}
return false}return true}

function generate(){grid=Array(81).fill(0);solve(grid);
let remove=document.getElementById('difficulty').value;
while(remove>0){let i=Math.floor(Math.random()*81);if(grid[i]!=0){grid[i]=0;remove--}}
render()}

function render(){let inputs=document.querySelectorAll('input');inputs.forEach((inp,i)=>inp.value=grid[i]||'')}

function getGrid(){return Array.from(document.querySelectorAll('input')).map(i=>i.value?+i.value:0)}

function newGame(){generate();startTimer()}

function checkSolution(){let g=getGrid(),copy=[...g];alert(solve(copy)?'Valid so far 👍':'Incorrect ❌')}

function solveGame(){let g=getGrid();if(solve(g)){grid=g;render()}}

function toggleNotes(){notesMode=!notesMode;alert('Notes '+(notesMode?'ON':'OFF'))}

createBoard();newGame();
</script>

</body>
</html>
